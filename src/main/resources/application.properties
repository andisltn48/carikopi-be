spring.application.name=carikopi
server.port=8082
app.url=http://127.0.0.1:8082/

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/carikopi
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Hibernate auto-detects PostgreSQL dialect + spatial support via hibernate-spatial on classpath
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Handler
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379