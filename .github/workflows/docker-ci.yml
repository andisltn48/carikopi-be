name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /home/andislhr/projects/carikopi-be

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    # PostGIS service for tests
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: carikopi
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5433:5432 # Map to 5433 to avoid conflict with local production db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: ./mvnw -B clean verify --file pom.xml
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/carikopi
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: ci_password

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log into registry ${{ env.REGISTRY }}
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,format=long
          type=ref,event=branch
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: self-hosted
    steps:
    - name: Deploy to local environment
      run: |
        cd ${{ env.DEPLOY_PATH }}
        # Ensure we have the latest docker-compose etc.
        # Use git pull if the runner is in the repo directory, but we can also build from GHCR.
        # To avoid downtime and ensure speed, we can use the local checkout.
        git pull origin main
        docker compose up -d --build
